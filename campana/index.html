<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campaña DM · Sombras sobre Fellise</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-section="campana">
    <canvas id="particle-canvas" aria-hidden="true"></canvas>
    <div class="reading-progress" id="reading-progress"></div>
    <nav class="topbar">
      <a href="/" class="topbar-home">← Índice</a>
      <span class="topbar-title" id="topbar-title"></span>
      <span class="topbar-badge" id="topbar-badge"></span>
    </nav>

    <header class="hero">
      <p class="kicker">Mistborn D20 · Solo DM</p>
      <h1 id="section-title">Cargando...</h1>
      <p id="section-subtitle" class="section-meta"></p>
    </header>

    <div class="page-layout">
      <aside class="toc-sidebar">
        <p class="toc-label">Contenido</p>
        <nav id="toc-nav"></nav>
      </aside>
      <main class="section-main">
        <section id="section-content" class="section-content"></section>
      </main>
    </div>

    <button class="back-top" id="back-top" aria-label="Volver arriba">↑</button>
    <footer class="footer">Fellise · Edición web</footer>
    <script type="module" src="../app.js"></script>

    <!-- Password gate -->
    <div id="pw-gate" class="pw-gate">
      <div class="pw-box">
        <p class="pw-icon">🔒</p>
        <h2>Acceso restringido</h2>
        <p class="pw-hint">Esta sección es solo para el Dungeon Master.</p>
        <input id="pw-input" type="password" placeholder="Contraseña" class="pw-input" autocomplete="off" />
        <button id="pw-btn" class="pw-btn">Entrar</button>
        <p id="pw-error" class="pw-error" hidden>Contraseña incorrecta.</p>
      </div>
    </div>
    <script>
      (function() {
        const PASS = "martin";
        const KEY  = "campana_unlocked";
        const gate = document.getElementById("pw-gate");
        if (sessionStorage.getItem(KEY) === "1") { gate.remove(); return; }
        document.body.style.overflow = "hidden";
        document.getElementById("pw-btn").addEventListener("click", check);
        document.getElementById("pw-input").addEventListener("keydown", e => { if (e.key === "Enter") check(); });
        function check() {
          if (document.getElementById("pw-input").value === PASS) {
            sessionStorage.setItem(KEY, "1");
            document.body.style.overflow = "";
            gate.remove();
          } else {
            document.getElementById("pw-error").hidden = false;
            document.getElementById("pw-input").value = "";
            document.getElementById("pw-input").focus();
          }
        }
      })();
    </script>
  </body>
</html>
