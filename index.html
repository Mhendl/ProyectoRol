<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sombras sobre Greyhaven · Archivo</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="kicker">Mistborn D20 · Archivo interactivo</p>
      <h1>Sombras sobre Greyhaven</h1>
      <p class="lead">
        La ceniza cae. La niebla oculta. El metal arde.<br>
        Compendio digital del sistema y la campaña.
      </p>
    </header>

    <main class="container">
      <section class="panel">
        <div class="panel-header">
          <h2>Rutas del libro</h2>
          <span class="subtitle">Seis secciones del PDF disponibles</span>
        </div>
        <div id="routes-grid" class="cards" aria-live="polite"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Mapa de Greyhaven</h2>
          <span class="subtitle">Ciudad industrial bajo la niebla eterna</span>
        </div>
        <div class="city-map-wrap">
          <a href="img/Mapa%20del%20misterioso%20Greyhaven.png" target="_blank" title="Ver mapa completo">
            <img src="img/Mapa%20del%20misterioso%20Greyhaven.png" alt="Mapa de Greyhaven" class="city-map-img" />
          </a>
        </div>
      </section>

    </main>

    <footer class="footer">Greyhaven · Edición web</footer>

    <script type="module" src="app.js"></script>
  </body>
</html>
