<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa de Rol - Mistborn</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1 id="scene-title">Mapa de Rol</h1>
        <div class="controls">
          <button id="mute-btn" type="button" aria-pressed="false">🔊 Sonido</button>
          <label for="volume" class="volume-label">Volumen</label>
          <input id="volume" type="range" min="0" max="1" step="0.05" value="0.7" />
        </div>
      </header>

      <section class="map-wrapper" aria-live="polite">
        <div id="map" class="map" role="img" aria-label="Mapa interactivo"></div>
      </section>

      <p id="status" class="status">Cargando escenas...</p>
    </main>

    <script type="module" src="app.js"></script>
  </body>
</html>
